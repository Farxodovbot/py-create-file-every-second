<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG UC SPIN</title>
    <style>
        body { margin: 0; background: #0b0e11; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #1c1f26; padding: 25px; border-radius: 20px; text-align: center; width: 320px; border: 1px solid #333; }
        .balance { font-size: 35px; color: #f39c12; font-weight: bold; margin: 15px 0; }
        
        /* Baraban */
        .wheel-box { position: relative; width: 200px; height: 200px; margin: 20px auto; border: 5px solid #444; border-radius: 50%; overflow: hidden; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); 
            background: conic-gradient(#e74c3c 0deg 60deg, #3498db 60deg 120deg, #f1c40f 120deg 180deg, #2ecc71 180deg 240deg, #9b59b6 240deg 300deg, #e67e22 300deg 360deg);
        }
        .needle { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid #fff; z-index: 5; }

        .btn { background: #f39c12; color: #000; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #444; color: #888; }
        .promo-btn { background: none; border: 1px solid #f39c12; color: #f39c12; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2>UC TERMINAL</h2>
    <div style="font-size: 12px; color: #888;">BALANSINGIZ:</div>
    <div class="balance"><span id="bal">0</span> UC</div>

    <div class="wheel-box">
        <div class="needle"></div>
        <div id="wheel"></div>
    </div>

    <button class="btn" id="spinBtn" onclick="spin()">AYLANTIRISH (3/3)</button>
    <button class="btn" style="background: #27ae60; color: white;" onclick="withdraw()">YECHIB OLISH (Min: 360)</button>
    <button class="btn promo-btn" onclick="promo()">PROMOKOD</button>
    
    <p id="msg" style="font-size: 14px; margin-top: 15px;"></p>
</div>

<script>
    let uc = parseInt(localStorage.getItem('my_uc')) || 0;
    let tries = parseInt(localStorage.getItem('my_tries')) || 3;
    let angle = 0;

    document.getElementById('bal').innerText = uc;
    document.getElementById('spinBtn').innerText = `AYLANTIRISH (${tries}/3)`;

    function spin() {
        if (tries <= 0) return alert("Bugungi imkoniyat tugadi!");
        
        tries--;
        localStorage.setItem('my_tries', tries);
        document.getElementById('spinBtn').disabled = true;
        
        let win = [0, 10, 60, 100, 5, 20][Math.floor(Math.random() * 6)];
        angle += 1800 + Math.random() * 360;
        document.getElementById('wheel').style.transform = `rotate(${angle}deg)`;

        setTimeout(() => {
            uc += win;
            localStorage.setItem('my_uc', uc);
            document.getElementById('bal').innerText = uc;
            document.getElementById('spinBtn').innerText = `AYLANTIRISH (${tries}/3)`;
            document.getElementById('msg').innerText = win > 0 ? `YUTUQ: +${win} UC!` : "OMAD KELMADI";
            if (tries > 0) document.getElementById('spinBtn').disabled = false;
        }, 4000);
    }

    function promo() {
        let p = prompt("Promokodni yozing:");
        if (p === "UZB2026") {
            if (localStorage.getItem('p_used')) return alert("Ishlatilgan!");
            uc += 50;
            localStorage.setItem('my_uc', uc);
            localStorage.setItem('p_used', '1');
            location.reload();
        } else { alert("Xato!"); }
    }

    function withdraw() {
        if (uc < 360) return alert("Kamida 360 UC kerak!");
        let id = prompt("PUBG ID raqamingizni yozing:");
        if (id) {
            alert(`Muvaffaqiyatli! ${uc} UC tez orada ${id} raqamiga yuboriladi.`);
            uc = 0;
            localStorage.setItem('my_uc', 0);
            location.reload();
        }
    }
</script>

</body>
</html>
